<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물리 실험 고해상도 프레임 분석기</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 10px; }

        header {
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 { font-size: 1.5rem; color: var(--text-color); }

        .input-section {
            background-color: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 15px; }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="file"] {
            display: block; width: 100%; padding: 10px;
            border: 1px dashed var(--border-color);
            background: #fff; border-radius: 6px; cursor: pointer;
        }

        input[type="number"], select {
            width: 100%; padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 1rem; background: #fff;
        }

        .btn {
            display: inline-block; width: 100%;
            background-color: var(--primary-color); color: white;
            padding: 12px; border: none; border-radius: 6px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: background-color 0.2s; text-align: center;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .status-msg { margin-top: 10px; text-align: center; font-weight: bold; color: var(--primary-color); }

        .selection-section { display: none; margin-bottom: 25px; }

        .selection-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }

        .frame-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color);
            padding: 15px; border-radius: 8px; background: #f9fafb;
        }

        .frame-item {
            position: relative; border: 2px solid var(--border-color);
            border-radius: 6px; overflow: hidden; background: #fff; cursor: pointer;
        }

        .frame-item.selected { border-color: var(--primary-color); background-color: #eff6ff; }
        .frame-item img { width: 100%; height: auto; display: block; }

        .frame-info {
            padding: 8px; display: flex; align-items: center; gap: 10px;
            font-size: 0.9rem; background: rgba(255, 255, 255, 0.9);
        }

        .frame-info input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        .result-section { margin-top: 25px; display: none; }

        .preview-container {
            width: 100%; overflow-x: auto; border: 1px solid var(--border-color);
            border-radius: 6px; padding: 10px; background-color: #f3f4f6; margin-bottom: 15px;
        }

        #resultPreview { display: block; max-width: 100%; height: auto; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        .select-tools { display: flex; gap: 10px; }
        .btn-sub { background-color: #6b7280; padding: 6px 12px; font-size: 0.85rem; }
        .btn-sub:hover { background-color: #4b5563; }

        @media (min-width: 640px) {
            h1 { font-size: 2rem; }
            .btn { width: auto; padding: 12px 30px; }
            .flex-row { display: flex; gap: 15px; align-items: flex-end; }
            .flex-row .form-group { flex: 1; margin-bottom: 0; }
            .frame-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>물리 실험 고해상도 선택 합성기</h1>
    </header>

    <main>
        <section class="input-section">
            <div class="form-group">
                <label for="videoInput">1. 실험 동영상 업로드 (.mp4)</label>
                <input type="file" id="videoInput" accept="video/mp4,video/*">
            </div>
            
            <div class="flex-row">
                <div class="form-group">
                    <label for="intervalInput">2. 캡처 간격 (초, 최소 0.01초 가능)</label>
                    <input type="number" id="intervalInput" value="0.05" step="0.01" min="0.01" max="5.0">
                </div>
                <div class="form-group">
                    <label for="blendInput">3. 잔상 투명도 (합성 방식)</label>
                    <select id="blendInput">
                        <option value="lighten">밝은 영역 우선 (추천: 어두운 배경+밝은 공)</option>
                        <option value="darken" selected>어두운 영역 우선 (추천: 밝은 배경+어두운 공)</option>
                        <option value="0.4">균일하게 겹치기 (투명도 40%)</option>
                        <option value="0.6">균일하게 겹치기 (투명도 60%)</option>
                    </select>
                </div>
                <button id="extractBtn" class="btn" style="margin-top: 15px;" disabled>프레임 가져오기</button>
            </div>
            <div id="status" class="status-msg"></div>
        </section>

        <section id="selectionSection" class="selection-section">
            <div class="selection-header">
                <h2>2. 합성할 프레임 선택</h2>
                <div class="select-tools">
                    <button id="selectAllBtn" class="btn btn-sub">전체 선택</button>
                    <button id="selectNoneBtn" class="btn btn-sub">전체 해제</button>
                </div>
            </div>
            <div id="frameGrid" class="frame-grid"></div>
            <div style="margin-top: 20px; text-align: right;">
                <button id="mergeBtn" class="btn">선택한 프레임 하나로 겹치기</button>
            </div>
        </section>

        <section id="resultSection" class="result-section">
            <h2>3. 다중 노출 합성 결과</h2>
            <div class="preview-container">
                <img id="resultPreview" alt="합성 결과 이미지">
            </div>
            <button id="downloadBtn" class="btn">PNG 이미지 다운로드</button>
        </section>
    </main>
</div>

<video id="hiddenVideo" style="display:none;" playsinline muted></video>
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    const videoInput = document.getElementById('videoInput');
    const intervalInput = document.getElementById('intervalInput');
    const blendInput = document.getElementById('blendInput');
    const extractBtn = document.getElementById('extractBtn');
    const status = document.getElementById('status');
    
    const selectionSection = document.getElementById('selectionSection');
    const frameGrid = document.getElementById('frameGrid');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const selectNoneBtn = document.getElementById('selectNoneBtn');
    const mergeBtn = document.getElementById('mergeBtn');
    
    const resultSection = document.getElementById('resultSection');
    const resultPreview = document.getElementById('resultPreview');
    const downloadBtn = document.getElementById('downloadBtn');
    
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('hiddenCanvas');
    const ctx = canvas.getContext('2d');

    let videoFileUrl = null;
    let extractedFrames = [];

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            if (videoFileUrl) URL.revokeObjectURL(videoFileUrl);
            videoFileUrl = URL.createObjectURL(file);
            video.src = videoFileUrl;
            video.load();
            extractBtn.disabled = false;
            status.textContent = "동영상이 로드되었습니다. [프레임 가져오기]를 눌러주세요.";
            selectionSection.style.display = 'none';
            resultSection.style.display = 'none';
        }
    });

    extractBtn.addEventListener('click', async () => {
        const interval = parseFloat(intervalInput.value);
        // 검증 조건 최소값을 0.01로 수정
        if (isNaN(interval) || interval < 0.01 || interval > 5) {
            alert("캡처 간격은 0.01초에서 5초 사이로 입력해주세요.");
            return;
        }

        extractBtn.disabled = true;
        status.textContent = "영상의 장면들을 정밀하게 분석하는 중입니다...";
        frameGrid.innerHTML = '';
        extractedFrames = [];

        if (video.readyState < 1) {
            await new Promise(resolve => video.onloadedmetadata = resolve);
        }

        const duration = video.duration;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const captureTimes = [];
        for (let t = 0; t <= duration; t += interval) {
            captureTimes.push(t);
        }

        // 프레임 수가 너무 많아 브라우저가 멈추는 것을 방지하기 위한 안전장치
        if (captureTimes.length > 200) {
            if(!confirm(`추출할 프레임이 총 ${captureTimes.length}개로 매우 많습니다. 모바일 기기나 저사양 PC에서는 브라우저가 느려질 수 있습니다. 계속할까요?`)) {
                extractBtn.disabled = false;
                status.textContent = "추출이 취소되었습니다.";
                return;
            }
        }

        for (let i = 0; i < captureTimes.length; i++) {
            const time = captureTimes[i];
            video.currentTime = time;
            await new Promise(resolve => video.onseeked = resolve);

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgDataUrl = canvas.toDataURL('image/png');

            extractedFrames.push({ time, imgDataUrl });

            const item = document.createElement('div');
            item.className = 'frame-item selected';
            item.dataset.index = i;

            item.innerHTML = `
                <img src="${imgDataUrl}" alt="frame">
                <div class="frame-info">
                    <input type="checkbox" checked>
                    <span>${time.toFixed(3)}초</span>
                </div>
            `;

            item.addEventListener('click', function(e) {
                if(e.target.tagName !== 'INPUT') {
                    const cb = this.querySelector('input[type="checkbox"]');
                    cb.checked = !cb.checked;
                }
                this.classList.toggle('selected', this.querySelector('input[type="checkbox"]').checked);
            });

            frameGrid.appendChild(item);
        }

        status.textContent = "장면 추출 완료! 원하는 순간만 선택해 합성해 보세요.";
        selectionSection.style.display = 'block';
        extractBtn.disabled = false;
    });

    selectAllBtn.addEventListener('click', () => toggleAll(true));
    selectNoneBtn.addEventListener('click', () => toggleAll(false));

    function toggleAll(checked) {
        document.querySelectorAll('.frame-item').forEach(item => {
            item.querySelector('input[type="checkbox"]').checked = checked;
            item.classList.toggle('selected', checked);
        });
    }

    mergeBtn.addEventListener('click', () => {
        const items = document.querySelectorAll('.frame-item');
        const selectedIndices = [];
        
        items.forEach(item => {
            if (item.querySelector('input[type="checkbox"]').checked) {
                selectedIndices.push(parseInt(item.dataset.index));
            }
        });

        if (selectedIndices.length === 0) {
            alert("합성할 프레임을 최소 1개 이상 선택해 주세요.");
            return;
        }

        status.textContent = "합성하는 중...";
        const blendMode = blendInput.value;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const firstImg = new Image();
        firstImg.src = extractedFrames[selectedIndices[0]].imgDataUrl;
        
        firstImg.onload = () => {
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(firstImg, 0, 0);

            let loadedCount = 1;
            
            if (selectedIndices.length === 1) {
                finalizeImage();
                return;
            }

            for (let i = 1; i < selectedIndices.length; i++) {
                const nextImg = new Image();
                nextImg.src = extractedFrames[selectedIndices[i]].imgDataUrl;
                
                nextImg.onload = () => {
                    if (blendMode === 'lighten' || blendMode === 'darken') {
                        ctx.globalAlpha = 1.0;
                        ctx.globalCompositeOperation = blendMode;
                    } else {
                        ctx.globalAlpha = parseFloat(blendMode);
                        ctx.globalCompositeOperation = 'source-over';
                    }

                    ctx.drawImage(nextImg, 0, 0);
                    loadedCount++;

                    if (loadedCount === selectedIndices.length) {
                        finalizeImage();
                    }
                };
            }
        };
    });

    function finalizeImage() {
        resultPreview.src = canvas.toDataURL('image/png');
        resultSection.style.display = 'block';
        status.textContent = "합성이 완료되었습니다!";
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    downloadBtn.addEventListener('click', () => {
        const dataUrl = resultPreview.src;
        if (!dataUrl) return;

        const link = document.createElement('a');
        link.download = `physics_precision_overlay_${Date.now()}.png`;
        link.href = dataUrl;
        link.click();
    });
</script>
</body>
</html>
